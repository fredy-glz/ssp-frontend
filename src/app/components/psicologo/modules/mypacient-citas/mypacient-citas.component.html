<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;900&display=swap" rel="stylesheet">
<div class="row">
  <div class="col-12">

    <div class="row">
      <div class="col-md-4 col-12">
        <h2 style="color: darkblue;" >Citas</h2>
      </div>
      <div class="offset-md-4 col-md-4 col-12">
        <button type="button" [routerLink]="['/psicologo/paciente-detalles', id]" class="btn btn-primary">Añadir cita </button>
      </div>
    </div>

    <div class="row">
      <div class="col-12">

        <ddr-block-list *ngIf="blockItems.length > 0"
          [blockItems]="blockItems"
          labelNoResults="No hay eventos que mostrar"
          previousLabel="Previo"
          nextLabel="Siguiente"
          pagination="5"
          (itemSelected)="selectItem($event)"
          (actionSelected)="getAction($event)">

          <ng-template #templateInfoAdditional let-item="item">
            <span>{{item.start | date: 'dd/MM/yyyy, hh:mm a'}} {{item.end ? ' - ' + (item.end | date: 'dd/MM/yyyy, hh:mm a') : ''}}</span>
          </ng-template>

          <ng-template #templateHeader let-item="item">
            <span>{{item.title}}</span>
          </ng-template>

          <ng-template #templateData let-item="item">

            <ddr-block-data-item label="Tipo" [value]="item.className"></ddr-block-data-item>
            <ddr-block-data-item label="Descripción" [value]="item.description"></ddr-block-data-item>

          </ng-template>

        </ddr-block-list>
      </div>
    </div>

  </div>
</div>
