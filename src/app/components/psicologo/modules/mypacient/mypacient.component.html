<div *ngIf="longitud < 1" class="container">
  <h3>Sin registros</h3>
  <img src="../../../../../assets/img/mypaciente.png" alt="">
</div>

<div *ngIf="longitud > 0" class="container">
  <mat-form-field>
    <mat-label>Buscar</mat-label>
    <input matInput (keyup)="applyFilter($event)" #input>
  </mat-form-field>

  <div class="mat-elevation-z8" id="con_cita">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="nua">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> NUA </th>
        <td mat-cell *matCellDef="let row"> {{row.nua}} </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
        <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="primerApellido">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Primer apellido </th>
        <td mat-cell *matCellDef="let row"> {{row.primerApellido}} </td>
      </ng-container>

      <ng-container matColumnDef="segundoApellido">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Segundo apellido </th>
        <td mat-cell *matCellDef="let row"> {{row.segundoApellido}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Acciones </th>
        <td mat-cell *matCellDef="let row" style="color: green;"> <a mat-list-item routerLinkActive="list-item-active" [routerLink]="['/psicologo/mispacientes/citas', row.userId]">Ver citas</a></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
