<div class="body">
  <div class="container">
    <div class="panel">
      <div class="row">
          <div class="col liquid" id="carrusel">
            <h4 class="mt-1">Psicologia</h4>
            <!-- Owl-Carousel -->
            <div class="owl-carousel owl-theme" >
              <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
                <div class="carousel-inner">
                  <div class="carousel-item active">
                    <img class="login_img" src="../../../assets/img/undraw_authentication_fsn5.png"
                      alt="First slide">
                  </div>
                  <div class="carousel-item">
                    <img class="login_img" src="../../../assets/img/undraw_fingerprint_swrc.png"
                      alt="Second slide">
                  </div>
                  <div class="carousel-item">
                    <img class="login_img" src="../../../assets/img/undraw_personal_data_29co.png"
                      alt="Third slide">
                  </div>
                </div>
                <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="sr-only">Next</span>
                </a>
              </div>
            </div>
            <!-- /Owl-Carousel -->
            <div class="follow">
              <i class="fab fa-facebook-f"></i> Orientación Psicológica DICIS
            </div>
          </div>
          <div class="col login">

            <button type="button" class="btn btn-signup" routerLink="/signup">Registrate</button>
            <form autocomplete="off" [formGroup]="formulario" (ngSubmit)="login()">
                <div class="titles">
                    <h6>Sistema Integral de Salud Estudiantil</h6>
                    <h3>Inicia Sesión</h3>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Email" class="form-input" formControlName="email">
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Contraseña" class="form-input" formControlName="password" id="myinput">
                    <div class="input-icon">
                        <i class="fas fa-user-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">Login</button>
            </form>

        </div>
      </div>
    </div>
  </div>
</div>
